<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniWay - Calculadora de Viaje</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='aniway_favicon.ico') }}">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div id="layout">

<div id="sidebar">
<div class="header-container">
<img src="{{ url_for('static', filename='logo.png') }}" class="neon-logo">
<h1>AniWay</h1>
</div>

<form method="POST">

<label>TIPO DE REPARTO</label>
<select id="modo_coste" name="modo_coste" onchange="cambiarModoCoste()">
<option value="total">Coste total conjunto</option>
<option value="separado">Coste separado ida / vuelta</option>
</select>

<div id="coste_total_container">
<label>DINERO TOTAL VIAJE (€)</label>
<input type="number" step="0.01" name="coste_total" placeholder="0.00">
</div>

<div id="coste_separado_container" style="display:none;">
<label>COSTE IDA (€)</label>
<input type="number" step="0.01" name="coste_ida" placeholder="0.00">
<label>COSTE VUELTA (€)</label>
<input type="number" step="0.01" name="coste_vuelta" placeholder="0.00">
</div>

<h3>Ruta y Pasajeros</h3>
<div id="listaTrayectos"></div>

<input type="hidden" id="total_ida" name="total_groups_ida" value="0">
<input type="hidden" id="total_vuelta" name="total_groups_vuelta" value="0">

<button type="button" class="btn btn-add" onclick="crearTramo('ida')">+ AÑADIR TRAMO IDA</button>
<button type="button" class="btn btn-add" onclick="crearTramo('vuelta')">+ AÑADIR TRAMO VUELTA</button>
<button type="submit" class="btn btn-submit">CALCULAR REPARTO</button>

</form>

{% if resultados %}
<div class="results-container">
<h4>RESULTADOS</h4>
{% for r in resultados %}
<div class="result-row">
<span>{{ r.nombre }}</span>
<strong>{{ r.coste }} € ({{ r.km }} km)</strong>
</div>
{% endfor %}
</div>
{% endif %}

</div>

<div id="map-container"></div>
</div>

<script>
const LOCATIONIQ_KEY = "{{ config.get('LOCATIONIQ_KEY', '') }}";
</script>

<script>
let map, markerOri, markerDest, activo = null;
let countIda = 0;
let countVuelta = 0;

function init(){
map = L.map('map-container',{zoomControl:false}).setView([40.41,-3.70],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

map.on('click',e=>{
if(!activo) return;
updatePoint(e.latlng.lat,e.latlng.lng);
});

setTimeout(()=>map.invalidateSize(),500);
}

function cambiarModoCoste(){
const modo=document.getElementById("modo_coste").value;
document.getElementById("coste_total_container").style.display = modo==="total"?"block":"none";
document.getElementById("coste_separado_container").style.display = modo==="separado"?"block":"none";
}

function crearTramo(tipo){
let n;
if(tipo==="ida"){
countIda++;
n=countIda;
document.getElementById("total_ida").value=countIda;
}else{
countVuelta++;
n=countVuelta;
document.getElementById("total_vuelta").value=countVuelta;
}

const div=document.createElement('div');
div.className='grupo-card';

div.innerHTML=`
<button type="button" class="btn-remove" onclick="eliminarTramo(this,'${tipo}')">✕</button>
<p class="card-id">${tipo.toUpperCase()} #${n}</p>

<label>NOMBRES AMIGOS</label>
<input type="text" name="${tipo}_amigos_${n}" placeholder="Ana, Pepe, Luis..." required>

<label>ORIGEN (click en mapa)</label>
<input type="text" id="${tipo}_ori_${n}" onfocus="setActivo('${tipo}',${n},'ori')" readonly>

<label>DESTINO (click en mapa)</label>
<input type="text" id="${tipo}_dest_${n}" onfocus="setActivo('${tipo}',${n},'dest')" readonly>

<label>DISTANCIA (KM)</label>
<input type="number" step="0.1" name="${tipo}_dist_${n}" id="${tipo}_km_${n}" class="km-input" readonly required>
`;

document.getElementById("listaTrayectos").appendChild(div);
}

function eliminarTramo(btn,tipo){
btn.closest('.grupo-card').remove();
if(tipo==="ida"){
countIda--;
document.getElementById("total_ida").value=countIda;
}else{
countVuelta--;
document.getElementById("total_vuelta").value=countVuelta;
}
}

function setActivo(tipo,n,campo){
activo={tipo,n,campo};
}

async function updatePoint(lat,lng){
const {tipo,n,campo}=activo;
const input=document.getElementById(`${tipo}_${campo}_${n}`);

input.dataset.lat=lat;
input.dataset.lng=lng;
input.value=`${lat.toFixed(5)}, ${lng.toFixed(5)}`;

if(campo==="ori"){
if(markerOri) map.removeLayer(markerOri);
markerOri=L.marker([lat,lng]).addTo(map);
}else{
if(markerDest) map.removeLayer(markerDest);
markerDest=L.marker([lat,lng]).addTo(map);
}

map.panTo([lat,lng]);
calcularRuta(tipo,n);
}

async function calcularRuta(tipo,n){
const ori=document.getElementById(`${tipo}_ori_${n}`);
const dest=document.getElementById(`${tipo}_dest_${n}`);

if(ori.dataset.lat && dest.dataset.lat){
try{
const res=await fetch(`/route?lat1=${ori.dataset.lat}&lon1=${ori.dataset.lng}&lat2=${dest.dataset.lat}&lon2=${dest.dataset.lng}`);
const data=await res.json();

if(data.km){
document.getElementById(`${tipo}_km_${n}`).value=data.km;
}else{
alert("No se pudo calcular la ruta");
}
}catch(e){
alert("Error calculando ruta");
}
}
}

window.onload=init;
</script>
</body>
</html>
